<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>City Section</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
  }
  .stage {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    display: block;
  }
</style>
</head>
<body>
  <svg class="stage" viewBox="0 0 1108 597" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Hatch pattern representing the ground -->
      <pattern id="groundHatch" width="14" height="14" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
        <rect width="14" height="14" fill="#4d4d4d"></rect>
        <line x1="0" y1="0" x2="0" y2="14" stroke="#5c5c5c" stroke-width="2"></line>
      </pattern>
    </defs>

    <!-- Sky / surface area -->
    <rect x="0" y="0" width="1108" height="290" fill="#ffffff"></rect>

    <!-- Ground surface line with tick marks -->
    <g stroke="#000000" stroke-width="2">
      <line x1="0" y1="290" x2="1108" y2="290"></line>
      <line x1="10"  y1="280" x2="10"  y2="290"></line>
      <line x1="218" y1="280" x2="218" y2="290"></line>
      <line x1="427" y1="280" x2="427" y2="290"></line>
      <line x1="635" y1="280" x2="635" y2="290"></line>
      <line x1="843" y1="280" x2="843" y2="290"></line>
    </g>

    <!-- Ground (underground) area -->
    <rect x="0" y="290" width="1108" height="307" fill="url(#groundHatch)"></rect>

    <!-- Subway line -->
    <line x1="10" y1="449" x2="962" y2="449" stroke="#e3a15f" stroke-width="4" stroke-linecap="round"></line>
  </svg>
</body>
</html>
